# MediaINT Newsletter Subscribe API proxy
# Add this inside the server block of kimyonghee.com nginx config:
#
#   include /home/projects/kimyonghee-website/services/newsletter/nginx-subscribe.conf;

location /api/subscribe {
    proxy_pass http://127.0.0.1:5100/subscribe;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location /api/unsubscribe {
    proxy_pass http://127.0.0.1:5100/unsubscribe;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location /api/stats {
    proxy_pass http://127.0.0.1:5100/stats;
    proxy_set_header Host $host;
}
