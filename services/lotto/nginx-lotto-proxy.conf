# Lotto API proxy - bypasses CORS for dhlottery.co.kr
# Add this inside the server block of kimyonghee.com nginx config:
#
#   include /home/projects/kimyonghee-website/services/lotto/nginx-lotto-proxy.conf;

location /api/lotto {
    proxy_pass https://www.dhlottery.co.kr/common.do;
    proxy_set_header Host www.dhlottery.co.kr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_ssl_server_name on;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    # Cache for 1 hour - lotto results don't change often
    proxy_cache_valid 200 1h;
    add_header X-Proxy "kimyonghee-lotto";
}
