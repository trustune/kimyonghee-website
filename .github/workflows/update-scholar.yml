name: Update Google Scholar Data

on:
  schedule:
    # Daily 12:00 KST (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scholar-update
  cancel-in-progress: true

jobs:
  update-scholar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scholarly

      - name: Run Scholar update script
        run: |
          python scripts/update_scholar_data.py
        env:
          PYTHONIOENCODING: utf-8
          SCHOLAR_AUTHOR_ID: semkeskAAAAJ
          SCHOLAR_MAX_RETRIES: '3'
          SCHOLAR_RETRY_DELAY_SECONDS: '20'
          SCHOLAR_REQUEST_DELAY_SECONDS: '2'

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet src/data/publications.json src/content/publications/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/publications.json src/content/publications/
          git commit -m "chore: auto-update google scholar data $(date +'%Y-%m-%d')"
          git push

      - name: No changes detected
        if: steps.check_changes.outputs.changes != 'true'
        run: echo "No citation changes detected"
