name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Install SSH key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_KEY }}
        known_hosts: unnecessary
        config: |
          Host deploy-server
            HostName ${{ secrets.HOST }}
            User ${{ secrets.USERNAME }}
            Port 2222
            StrictHostKeyChecking no

    - name: Upload dist to server
      run: |
        rsync -avz --delete -e "ssh -p 2222 -o StrictHostKeyChecking=no" \
          dist/ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/kimyonghee.com/public/
        echo "Dist uploaded successfully"

    - name: Server-side setup (services & nginx)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: 2222
        command_timeout: 5m
        script: |
          cd /home/projects/kimyonghee-website
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          git pull origin main 2>/dev/null || true

          # Newsletter Subscribe API setup
          pip3 install pyyaml requests --quiet 2>/dev/null || true
          cp services/newsletter/mediaint-newsletter.service /etc/systemd/system/ 2>/dev/null || true
          systemctl daemon-reload 2>/dev/null || true
          systemctl enable mediaint-newsletter 2>/dev/null || true
          systemctl restart mediaint-newsletter 2>/dev/null || true

          # Nginx reverse proxy for /api/subscribe -> localhost:5100
          NGINX_CONF=$(find /etc/nginx -name "kimyonghee*" -type f 2>/dev/null | head -1)
          if [ -n "$NGINX_CONF" ] && ! grep -q "newsletter" "$NGINX_CONF" 2>/dev/null; then
            sed -i '/server_name.*kimyonghee/a\    include /home/projects/kimyonghee-website/services/newsletter/nginx-subscribe.conf;' "$NGINX_CONF"
            nginx -t && systemctl reload nginx
          fi

          # Nginx reverse proxy for /api/lotto -> dhlottery.co.kr (CORS bypass)
          if [ -n "$NGINX_CONF" ] && ! grep -q "nginx-lotto-proxy" "$NGINX_CONF" 2>/dev/null; then
            sed -i '/server_name.*kimyonghee/a\    include /home/projects/kimyonghee-website/services/lotto/nginx-lotto-proxy.conf;' "$NGINX_CONF"
            nginx -t && systemctl reload nginx
          fi

          echo "Deployment completed at $(date)"
