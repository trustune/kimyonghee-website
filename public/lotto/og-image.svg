<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="gray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="white" opacity="0.1"/>

  <!-- Lotto balls -->
  <circle cx="240" cy="260" r="52" fill="url(#yellow)"/>
  <text x="240" y="275" text-anchor="middle" fill="white" font-size="36" font-weight="800" font-family="sans-serif">7</text>
  <circle cx="370" cy="260" r="52" fill="url(#blue)"/>
  <text x="370" y="275" text-anchor="middle" fill="white" font-size="36" font-weight="800" font-family="sans-serif">13</text>
  <circle cx="500" cy="260" r="52" fill="url(#red)"/>
  <text x="500" y="275" text-anchor="middle" fill="white" font-size="36" font-weight="800" font-family="sans-serif">25</text>
  <circle cx="630" cy="260" r="52" fill="url(#gray)"/>
  <text x="630" y="275" text-anchor="middle" fill="white" font-size="36" font-weight="800" font-family="sans-serif">33</text>
  <circle cx="760" cy="260" r="52" fill="url(#green)"/>
  <text x="760" y="275" text-anchor="middle" fill="white" font-size="36" font-weight="800" font-family="sans-serif">42</text>
  <circle cx="890" cy="260" r="52" fill="url(#yellow)"/>
  <text x="890" y="275" text-anchor="middle" fill="white" font-size="36" font-weight="800" font-family="sans-serif">45</text>

  <!-- Question mark -->
  <text x="990" y="285" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="72" font-weight="800" font-family="sans-serif">?</text>

  <!-- Title -->
  <text x="600" y="430" text-anchor="middle" fill="white" font-size="52" font-weight="800" font-family="sans-serif">로또로 배우는 확률론</text>
  <text x="600" y="490" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="28" font-weight="600" font-family="sans-serif">확률 기초부터 마르코프 체인, 가설 검증까지</text>

  <!-- Footer -->
  <text x="600" y="555" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="20" font-family="sans-serif">kimyonghee.com/lotto</text>
</svg>
